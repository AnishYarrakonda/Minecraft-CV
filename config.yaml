# Default configuration for minecraft_cv.
# All tunable values live here; gesture/joystick code must never hold magic numbers.
# Loaded into a typed pydantic `Settings` model (see src/minecraft_cv/config.py).

camera:
  index: 0                  # Continuity Camera may steal index 0 -> a startup check warns
  width: 640
  height: 480
  fps: 30
  backend: avfoundation     # forced on macOS
  mirror: true              # flip horizontally -> mirror view; also fixes MediaPipe handedness

tracking:
  backend: mediapipe        # mediapipe | yolo
  device: auto              # auto | mps | cuda | cpu  (mediapipe ignores this; CPU-only)
  input_resolution: [256, 256]
  min_detection_confidence: 0.5
  min_tracking_confidence: 0.5
  max_num_hands: 2
  swap_handedness: true     # invert MediaPipe L/R labels to fix mirrored camera mapping
  # Tracking-loss recovery (Task 5):
  min_emit_confidence: 0.0  # drop hands below this handedness score (treated as absent); 0 = keep all
  dropout_flush_ms: 100.0   # absence longer than this -> hard flush (recenter + release everything)
  stabilization_ms: 500.0   # after a flush, suppress input this long while a new neutral re-seeds

gestures:
  left_hand:
    # Extension-based gestures: closed fist is default; extending specific fingers triggers
    # gestures. Each threshold is on a continuous extension ratio fed into a Schmitt trigger.
    jump:                   # thumb extended outward from fist
      type: thumb_out
      t_engage: 1.2         # normalized thumb-tip-to-index-MCP / hand-scale
      t_release: 0.9
    sneak:                  # index finger extended from fist (others curled)
      type: index_only
      t_engage: 1.15        # wrist-to-tip / wrist-to-pip ratio
      t_release: 1.05
    sprint:                 # middle finger extended from fist (others curled)
      type: middle_only
      t_engage: 1.15
      t_release: 1.05
    inventory:              # index + middle extended ("peace sign")
      type: index_middle
      t_engage: 1.15
      t_release: 1.05
      pulse: true           # one-shot key tap, not a hold
    throw_item:             # ring finger extended from fist
      type: ring_only
      t_engage: 1.15
      t_release: 1.05
      pulse: true
    switch_offhand:         # pinky finger extended from fist
      type: pinky_only
      t_engage: 1.15
      t_release: 1.05
      pulse: true
  right_hand:
    # Pinch-based gestures: thumb-to-fingertip distances.
    attack:                 # thumb -> index
      finger: index
      t_engage: 0.30
      t_release: 0.45
    use:                    # thumb -> middle
      finger: middle
      t_engage: 0.30
      t_release: 0.45
    hotbar_next:            # thumb -> ring (scroll up)
      finger: ring
      t_engage: 0.30
      t_release: 0.45
    hotbar_prev:            # thumb -> pinky (scroll down)
      finger: pinky
      t_engage: 0.30
      t_release: 0.45

joystick:
  deadzone_radius: 0.05     # normalized units; sphere radius (not a box)
  sensitivity: 2.0          # travel-to-saturation gain: full output at (1/sensitivity) travel
  accel_exponent: 2.0       # ease-in curve over [0,1] (gentle near center, fast at the edge)
  anchor: wrist             # wrist (landmark 0) | middle_mcp (landmark 9)
  max_output: 1.0           # output magnitude at saturation
  smoothing: 0.6            # EMA on anchor position (0=none ->1=heavy); kills jitter/chatter
  recenter_grace_frames: 3  # tolerate brief dropouts before recentering the neutral
  cardinal_half_width: 35.0 # degrees; pure cardinal zone = ±35° from each axis direction
  # Dynamic deadzone (V2): auto-size the deadzone from resting-hand jitter after (re)centering.
  dynamic_deadzone: false       # off -> use the static deadzone_radius above
  calibration_frames: 150       # resting samples (~5 s @30fps); output held at 0 during this
  dynamic_deadzone_margin: 1.5  # effective radius = deadzone_radius + margin * resting jitter
  # Mouse-look smoothing (V2): velocity-adaptive One-Euro filter on the right-hand look output.
  look_filter: one_euro         # one_euro | ema (ema = joystick smoothing only)
  one_euro_min_cutoff: 1.0      # Hz; lower = smoother at rest, more lag
  one_euro_beta: 0.007          # higher = less lag on fast looks, more jitter
  one_euro_d_cutoff: 1.0        # Hz; cutoff for the internal speed estimate

# Inventory mode (V2): a held two-hand open-palm pose toggles a modal cursor state where WASD
# and relative look are paused and the right hand drives the OS cursor in absolute screen
# coords (right-hand pinches act as left/right click; a held pinch is a click-and-drag).
inventory:
  enabled: true
  open_threshold: 1.1           # finger extension ratio above which a finger counts as open
  thumb_open_threshold: 0.9     # thumb lateral-extension ratio above which the thumb is open
  hold_frames: 8                # consecutive both-open frames required before toggling
  cooldown_frames: 20           # minimum frames between successive toggles
  cursor_gain: 1.0              # normalized hand displacement -> normalized screen displacement

# Sprint-via-velocity (Task 2): a quick forward push of the left hand toward the camera engages
# Sprint (Ctrl held alongside W); it holds while the hand stays forward and releases on retreat.
# Disabled by default because MediaPipe z is the least reliable landmark axis. When enabling,
# consider removing the static `sprint` (middle_only) extension gesture so both don't drive Ctrl.
sprint:
  enabled: false            # off by default; the middle-finger extension sprint still works
  v_sprint: 1.0             # forward-velocity threshold (normalized z units / second)
  trigger_frames: 3         # consecutive above-threshold frames required to engage
  release_margin: 0.02      # z hysteresis band: releases once the hand retreats this far back

input:
  enabled: false            # NullEmitter unless explicitly enabled (--input overrides)
  mouse_delta_scale: 15.0   # joystick units [0,1] -> CGEvent relative pixels for camera look
  scroll_repeat_rate_hz: 8  # hotbar pulse re-emit rate while a pinch is held
  key_repeat_guard_ms: 50   # minimum interval between repeated discrete events

# gesture -> game key/button binding (loaded from config, never hardcoded in src/)
bindings:
  # Left-hand discrete gestures.
  jump: space
  sneak: shift
  sprint: ctrl
  inventory: e
  throw_item: q
  switch_offhand: f
  # Right-hand discrete gestures.
  attack: mouse_left
  use: mouse_right
  hotbar_next: scroll_up
  hotbar_prev: scroll_down
  # Left-hand spatial-joystick translation -> WASD.
  forward: w
  back: s
  left: a
  right: d

debug:
  overlay: false            # --debug-overlay overrides
  log_level: WARNING        # never INFO-per-frame; rate-limited debug counters only
  overlay_every: 1          # draw the overlay every Nth frame (Task 4: decimate HighGUI cost)
