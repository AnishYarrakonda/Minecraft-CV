camera:
  index: 0
  width: 640
  height: 480
  fps: 30
  backend: avfoundation
  mirror: true
tracking:
  backend: mediapipe
  device: auto
  input_resolution:
  - 256
  - 256
  min_detection_confidence: 0.5
  min_tracking_confidence: 0.5
  max_num_hands: 2
  swap_handedness: true
  min_emit_confidence: 0.0
  dropout_flush_ms: 100.0
  stabilization_ms: 500.0
gestures:
  left_hand:
    jump:
      detector: pinch
      finger: index
      mode: hold
      t_engage: 0.3
      t_release: 0.45
    inventory:
      detector: pinch
      finger: middle
      mode: hold
      t_engage: 0.3
      t_release: 0.45
    throw_item:
      detector: pinch
      finger: ring
      mode: hold
      t_engage: 0.3
      t_release: 0.45
    switch_offhand:
      detector: pinch
      finger: pinky
      mode: hold
      t_engage: 0.3
      t_release: 0.45
    sneak:
      detector: curl_combo
      finger: pinky
      mode: hold
      t_engage: 0.95
      t_release: 1.05
      curl_fingers:
      - ring
      - pinky
      suppresses:
      - throw_item
      - switch_offhand
  right_hand:
    attack:
      detector: pinch
      finger: index
      mode: hold
      t_engage: 0.3
      t_release: 0.45
      conflict_group: primary_click
    use:
      detector: pinch
      finger: middle
      mode: hold
      t_engage: 0.3
      t_release: 0.45
      conflict_group: primary_click
    hotbar_next:
      detector: pinch
      finger: ring
      mode: hold
      t_engage: 0.3
      t_release: 0.45
      conflict_group: hotbar_scroll
    hotbar_prev:
      detector: pinch
      finger: pinky
      mode: hold
      t_engage: 0.3
      t_release: 0.45
      conflict_group: hotbar_scroll
    sprint:
      detector: curl_combo
      finger: ring
      mode: hold
      t_engage: 0.95
      t_release: 1.05
      curl_fingers:
      - ring
      - pinky
      suppresses:
      - hotbar_next
      - hotbar_prev
joystick:
  mode: palm_normal
  palm_normal:
    left_neutral:
    - -0.2789
    - -0.15363
    right_neutral:
    - 0.37115
    - -0.14468
    deadzone: 0.44679
    left_sensitivity:
    - 8.29951
    - 1.73796
    right_sensitivity:
    - 1.95802
    - 1.8916
  deadzone_radius: 0.05
  sensitivity: 2.0
  accel_exponent: 2.0
  anchor: wrist
  max_output: 1.0
  smoothing: 0.6
  recenter_grace_frames: 3
  cardinal_half_width: 35.0
  dynamic_deadzone: false
  calibration_frames: 150
  dynamic_deadzone_margin: 1.5
  look_filter: one_euro
  one_euro_min_cutoff: 1.0
  one_euro_beta: 0.007
  one_euro_d_cutoff: 1.0
inventory:
  enabled: false
  open_threshold: 1.1
  thumb_open_threshold: 0.9
  hold_frames: 8
  cooldown_frames: 20
  cursor_gain: 1.0
sprint:
  enabled: false
  v_sprint: 1.0
  trigger_frames: 3
  release_margin: 0.02
input:
  enabled: false
  mouse_delta_scale: 15.0
  scroll_repeat_rate_hz: 8
  key_repeat_guard_ms: 50
bindings:
  jump: space
  sneak: shift
  sprint: ctrl
  inventory: e
  throw_item: q
  switch_offhand: f
  attack: mouse_left
  use: mouse_right
  hotbar_next: scroll_up
  hotbar_prev: scroll_down
  forward: w
  back: s
  left: a
  right: d
debug:
  overlay: false
  log_level: WARNING
  overlay_every: 1
