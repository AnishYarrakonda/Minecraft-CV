camera:
  index: 0
  width: 640
  height: 480
  fps: 30
  backend: avfoundation
  mirror: true
tracking:
  backend: mediapipe
  device: auto
  input_resolution:
  - 256
  - 256
  min_detection_confidence: 0.5
  min_tracking_confidence: 0.5
  max_num_hands: 2
  swap_handedness: true
  min_emit_confidence: 0.0
  dropout_flush_ms: 100.0
  stabilization_ms: 500.0
gestures:
  # Left hand = pinch-WASD movement. No conflict groups: two simultaneous pinches
  # produce a diagonal (e.g. middle+index -> W+D).
  left_hand:
    move_right:
      detector: pinch
      finger: index
      mode: hold
      t_engage: 0.3
      t_release: 0.45
    move_forward:
      detector: pinch
      finger: middle
      mode: hold
      t_engage: 0.3
      t_release: 0.45
    move_left:
      detector: pinch
      finger: ring
      mode: hold
      t_engage: 0.3
      t_release: 0.45
    move_back:
      detector: pinch
      finger: pinky
      mode: hold
      t_engage: 0.3
      t_release: 0.45
  # Right hand = clicks + jump/sneak. attack/use and jump/sneak are mutually exclusive.
  right_hand:
    attack:
      detector: pinch
      finger: index
      mode: hold
      t_engage: 0.3
      t_release: 0.45
      conflict_group: primary_click
    use:
      detector: pinch
      finger: middle
      mode: hold
      t_engage: 0.3
      t_release: 0.45
      conflict_group: primary_click
    jump:
      detector: pinch
      finger: ring
      mode: hold
      t_engage: 0.3
      t_release: 0.45
      conflict_group: jump_sneak
    sneak:
      detector: pinch
      finger: pinky
      mode: hold
      t_engage: 0.3
      t_release: 0.45
      conflict_group: jump_sneak
    recenter:
      detector: extension_combo
      finger: index
      mode: hold
      t_engage: 1.15
      t_release: 1.05
      extension_fingers:
      - index
      - middle
      curl_fingers:
      - ring
      - pinky
      suppresses:
      - attack
      - use
      - jump
      - sneak
  face:
    inventory:
      blendshape: browInnerUp  # raise eyebrows -> E
      t_engage: 0.5
      t_release: 0.3
      engage_frames: 3
    throw_item:
      blendshape: jawOpen  # open mouth -> Q
      t_engage: 0.6
      t_release: 0.35
      engage_frames: 2
    swap_offhand:
      blendshape: eyeBlinkLeft  # blink left eye -> F
      t_engage: 0.5
      t_release: 0.3
      engage_frames: 2
  # Head roll (ear-to-shoulder) -> hotbar scroll. Swap left/right gesture names if the
  # mirrored feed inverts the direction.
  head_tilt:
    enabled: true
    left_gesture: hotbar_next   # roll toward left shoulder  -> scroll up
    right_gesture: hotbar_prev  # roll toward right shoulder -> scroll down
    engage_deg: 12.0
    release_deg: 7.0
    engage_frames: 2
    release_frames: 2

face_tracking:
  enabled: true
  model_path: models/face_landmarker.task
  device: cpu
  min_detection_confidence: 0.5
  min_tracking_confidence: 0.5

joystick:
  deadzone: 0.08
  left_sensitivity: 5.0
  right_sensitivity: 40.0
  look_accel_exponent: 1.25
  smoothing: 0.4
  right_smoothing: 0.6
  look_filter: one_euro
  one_euro_min_cutoff: 0.65
  one_euro_beta: 0.035
  one_euro_d_cutoff: 1.0
input:
  enabled: false
  mouse_delta_scale: 58.0
  scroll_repeat_rate_hz: 8
  key_repeat_guard_ms: 50
bindings:
  # Left-hand pinch-WASD.
  move_forward: w
  move_back: s
  move_left: a
  move_right: d
  # Right-hand pinches.
  attack: mouse_left
  use: mouse_right
  jump: space
  sneak: shift
  # Face gestures.
  throw_item: q
  inventory: e
  swap_offhand: f
  # Head-roll -> hotbar scroll.
  hotbar_next: scroll_up
  hotbar_prev: scroll_down
debug:
  overlay: false
  log_level: WARNING
  overlay_every: 1
