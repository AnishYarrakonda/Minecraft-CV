camera:
  index: 0
  width: 640
  height: 480
  fps: 30
  backend: avfoundation
  mirror: true
tracking:
  backend: mediapipe
  device: auto
  input_resolution:
  - 256
  - 256
  min_detection_confidence: 0.5
  min_tracking_confidence: 0.5
  max_num_hands: 2
  swap_handedness: true
  min_emit_confidence: 0.0
  dropout_flush_ms: 100.0
  stabilization_ms: 500.0
gestures:
  left_hand:
    jump:
      detector: pinch
      finger: index
      mode: hold
      t_engage: 0.3
      t_release: 0.45
    sneak:
      detector: pinch
      finger: pinky
      mode: hold
      t_engage: 0.3
      t_release: 0.45
    recenter:
      detector: extension_combo
      finger: index
      mode: hold
      t_engage: 1.15
      t_release: 1.05
      extension_fingers:
      - index
      - middle
      curl_fingers:
      - ring
      - pinky
      suppresses:
      - jump
      - sneak
  right_hand:
    attack:
      detector: pinch
      finger: index
      mode: hold
      t_engage: 0.3
      t_release: 0.45
      conflict_group: primary_click
    use:
      detector: pinch
      finger: middle
      mode: hold
      t_engage: 0.3
      t_release: 0.45
      conflict_group: primary_click
    hotbar_next:
      detector: pinch
      finger: ring
      mode: hold
      t_engage: 0.3
      t_release: 0.45
      conflict_group: hotbar_scroll
    hotbar_prev:
      detector: pinch
      finger: pinky
      mode: hold
      t_engage: 0.3
      t_release: 0.45
      conflict_group: hotbar_scroll
    recenter:
      detector: extension_combo
      finger: index
      mode: hold
      t_engage: 1.15
      t_release: 1.05
      extension_fingers:
      - index
      - middle
      curl_fingers:
      - ring
      - pinky
      suppresses:
      - attack
      - use
      - hotbar_next
      - hotbar_prev
  face:
    inventory:
      blendshape: browInnerUp
      t_engage: 0.5
      t_release: 0.3
      engage_frames: 3
    throw_item:
      blendshape: jawOpen
      t_engage: 0.6
      t_release: 0.35
      engage_frames: 2
    swap_offhand:
      blendshape: eyeBlinkLeft
      t_engage: 0.5
      t_release: 0.3
      engage_frames: 3

face_tracking:
  enabled: true
  model_path: models/face_landmarker.task
  device: cpu
  min_detection_confidence: 0.5
  min_tracking_confidence: 0.5

joystick:
  deadzone: 0.08
  left_sensitivity: 5.0
  right_sensitivity: 40.0
  look_accel_exponent: 1.25
  smoothing: 0.4
  right_smoothing: 0.6
  look_filter: one_euro
  one_euro_min_cutoff: 0.65
  one_euro_beta: 0.035
  one_euro_d_cutoff: 1.0
input:
  enabled: false
  mouse_delta_scale: 58.0
  scroll_repeat_rate_hz: 8
  key_repeat_guard_ms: 50
bindings:
  jump: space
  sneak: shift
  inventory: e
  throw_item: q
  swap_offhand: f

  attack: mouse_left
  use: mouse_right
  hotbar_next: scroll_up
  hotbar_prev: scroll_down
  forward: w
  back: s
  left: a
  right: d
debug:
  overlay: false
  log_level: WARNING
  overlay_every: 1
