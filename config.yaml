camera:
  index: 0
  width: 640
  height: 480
  fps: 30
  backend: avfoundation
  mirror: true
tracking:
  backend: mediapipe
  device: auto
  input_resolution:
  - 256
  - 256
  min_detection_confidence: 0.5
  min_tracking_confidence: 0.5
  max_num_hands: 2
  swap_handedness: true
  min_emit_confidence: 0.0
  dropout_flush_ms: 100.0
  stabilization_ms: 500.0
gestures:
  left_hand:
    right:
      detector: pinch
      finger: index
      mode: hold
      t_engage: 0.3
      t_release: 0.45
    forward:
      detector: pinch
      finger: middle
      mode: hold
      t_engage: 0.3
      t_release: 0.45
    left:
      detector: pinch
      finger: ring
      mode: hold
      t_engage: 0.3
      t_release: 0.45
    back:
      detector: pinch
      finger: pinky
      mode: hold
      t_engage: 0.3
      t_release: 0.45
  right_hand:
    attack:
      detector: pinch
      finger: index
      mode: hold
      t_engage: 0.3
      t_release: 0.45
    use:
      detector: pinch
      finger: middle
      mode: hold
      t_engage: 0.3
      t_release: 0.45
    jump:
      detector: pinch
      finger: ring
      mode: hold
      t_engage: 0.3
      t_release: 0.45
    sneak:
      detector: pinch
      finger: pinky
      mode: hold
      t_engage: 0.3
      t_release: 0.45
joystick:
  mode: palm_tilt
  tilt:
    left_neutral:
    - 0.03541
    - -0.82044
    right_neutral:
    - 0.0599
    - -0.83227
    deadzone: 0.0689
    left_sensitivity:
    - 4.36496
    - 14.37098
    right_sensitivity:
    - 9.87439
    - 6.48783
  palm_normal:
    left_neutral:
    - -0.2789
    - -0.15363
    right_neutral:
    - 0.37115
    - -0.14468
    deadzone: 0.44679
    left_sensitivity:
    - 8.29951
    - 1.73796
    right_sensitivity:
    - 1.95802
    - 1.8916
  deadzone_radius: 0.05
  sensitivity: 2.0
  accel_exponent: 2.0
  anchor: wrist
  max_output: 1.0
  smoothing: 0.6
  recenter_grace_frames: 3
  cardinal_half_width: 35.0
  dynamic_deadzone: false
  calibration_frames: 150
  dynamic_deadzone_margin: 1.5
  look_filter: one_euro
  one_euro_min_cutoff: 1.0
  one_euro_beta: 0.007
  one_euro_d_cutoff: 1.0
inventory:
  enabled: false
  open_threshold: 1.1
  thumb_open_threshold: 0.9
  hold_frames: 8
  cooldown_frames: 20
  cursor_gain: 1.0
sprint:
  enabled: false
  v_sprint: 1.0
  trigger_frames: 3
  release_margin: 0.02
input:
  enabled: false
  mouse_delta_scale: 15.0
  scroll_repeat_rate_hz: 8
  key_repeat_guard_ms: 50
bindings:
  jump: space
  sneak: shift
  sprint: ctrl
  inventory: e
  throw_item: q
  switch_offhand: f
  attack: mouse_left
  use: mouse_right
  hotbar_next: scroll_up
  hotbar_prev: scroll_down
  forward: w
  back: s
  left: a
  right: d
debug:
  overlay: true
  log_level: WARNING
  overlay_every: 1
face:
  face_decimation: 2
  head_roll_engage: 15.0
  head_roll_release: 10.0
  brow_inner_up_threshold: 0.5
  jaw_open_threshold: 0.5
  nose_sneer_threshold: 0.5
